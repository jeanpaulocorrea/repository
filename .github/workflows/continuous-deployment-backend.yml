name: Continuous Deployment BackEnd

on:
  workflow_run:
    workflows: ["Continuous Integration BackEnd"]
    types: [completed]
    branches: [master]
  workflow_dispatch:
    inputs:
      service:
        description: 'Which microservice to deploy'
        required: true
        type: choice
        default: all
        options:
          - all
          - main
          - order
          - identity-server
          - health-checker
          - notificator
          - invoice-generator

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 968225077300.dkr.ecr.us-east-1.amazonaws.com
  IMAGE_REPO_PREFIX: nsse/production
  GITOPS_REPO: kenerry-serain/not-so-simple-ecommerce-gitops
  GITOPS_KUSTOMIZE_DIR: production

jobs:
  detect-changes:
    name: Detect Changes
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      shared: ${{ steps.changes.outputs.shared }}
      main: ${{ steps.changes.outputs.main }}
      order: ${{ steps.changes.outputs.order }}
      identity-server: ${{ steps.changes.outputs.identity-server }}
      health-checker: ${{ steps.changes.outputs.health-checker }}
      notificator: ${{ steps.changes.outputs.notificator }}
      invoice-generator: ${{ steps.changes.outputs.invoice-generator }}
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Resolve image tag
        id: tag
        run: |
          SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
          echo "tag=${SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Detect changed paths
        id: changes
        env:
          DISPATCH_SVC: ${{ inputs.service }}
        run: |
          # workflow_dispatch: usa a escolha do usuário (all = liga todos)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            for svc in shared main order identity-server health-checker notificator invoice-generator; do
              if [ "$DISPATCH_SVC" = "all" ] || [ "$DISPATCH_SVC" = "$svc" ]; then
                echo "${svc}=true" >> "$GITHUB_OUTPUT"
              else
                echo "${svc}=false" >> "$GITHUB_OUTPUT"
              fi
            done
            exit 0
          fi

          # workflow_run: git diff entre o SHA do CI e o pai
          BASE="${{ github.event.workflow_run.head_sha }}~1"
          HEAD="${{ github.event.workflow_run.head_sha }}"
          CHANGED=$(git diff --name-only "$BASE" "$HEAD" || git diff --name-only HEAD~1 HEAD)

          check() {
            echo "$CHANGED" | grep -q "^$1" && echo "true" || echo "false"
          }

          SHARED=$(echo "$CHANGED" | grep -qE '^(src/domains/|src/infrastructure/|NotSoSimpleEcommerce\.sln)' && echo "true" || echo "false")
          echo "shared=$SHARED" >> "$GITHUB_OUTPUT"

          echo "main=$(check 'src/services/NotSoSimpleEcommerce.Main/')" >> "$GITHUB_OUTPUT"
          echo "order=$(check 'src/services/NotSoSimpleEcommerce.Order/')" >> "$GITHUB_OUTPUT"
          echo "identity-server=$(check 'src/services/NotSoSimpleEcommerce.IdentityServer/')" >> "$GITHUB_OUTPUT"
          echo "health-checker=$(check 'src/services/NotSoSimpleEcommerce.HealthChecker/')" >> "$GITHUB_OUTPUT"
          echo "notificator=$(check 'src/workers/NotSoSimpleEcommerce.Notificator/')" >> "$GITHUB_OUTPUT"
          echo "invoice-generator=$(check 'src/workers/NotSoSimpleEcommerce.InvoiceGenerator/')" >> "$GITHUB_OUTPUT"

  main:
    name: Main Service
    needs: detect-changes
    if: needs.detect-changes.outputs.shared == 'true' || needs.detect-changes.outputs.main == 'true'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - uses: aws-actions/configure-aws-credentials@v5.1.0
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_BACKEND_ROLE_TO_ASSUME }}
      - uses: aws-actions/amazon-ecr-login@v2
      - uses: docker/setup-buildx-action@v3
      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/services/NotSoSimpleEcommerce.Main/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.ECR_REGISTRY }}/${{ env.IMAGE_REPO_PREFIX }}/main:${{ needs.detect-changes.outputs.tag }}
          cache-from: type=gha,scope=main
          cache-to: type=gha,scope=main,mode=max

  order:
    name: Order Service
    needs: detect-changes
    if: needs.detect-changes.outputs.shared == 'true' || needs.detect-changes.outputs.order == 'true'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - uses: aws-actions/configure-aws-credentials@v5.1.0
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_BACKEND_ROLE_TO_ASSUME }}
      - uses: aws-actions/amazon-ecr-login@v2
      - uses: docker/setup-buildx-action@v3
      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/services/NotSoSimpleEcommerce.Order/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.ECR_REGISTRY }}/${{ env.IMAGE_REPO_PREFIX }}/order:${{ needs.detect-changes.outputs.tag }}
          cache-from: type=gha,scope=order
          cache-to: type=gha,scope=order,mode=max

  identity-server:
    name: Identity Server
    needs: detect-changes
    if: needs.detect-changes.outputs.shared == 'true' || needs.detect-changes.outputs.identity-server == 'true'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - uses: aws-actions/configure-aws-credentials@v5.1.0
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_BACKEND_ROLE_TO_ASSUME }}
      - uses: aws-actions/amazon-ecr-login@v2
      - uses: docker/setup-buildx-action@v3
      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/services/NotSoSimpleEcommerce.IdentityServer/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.ECR_REGISTRY }}/${{ env.IMAGE_REPO_PREFIX }}/identity-server:${{ needs.detect-changes.outputs.tag }}
          cache-from: type=gha,scope=identity-server
          cache-to: type=gha,scope=identity-server,mode=max

  health-checker:
    name: Health Checker
    needs: detect-changes
    if: needs.detect-changes.outputs.shared == 'true' || needs.detect-changes.outputs.health-checker == 'true'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - uses: aws-actions/configure-aws-credentials@v5.1.0
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_BACKEND_ROLE_TO_ASSUME }}
      - uses: aws-actions/amazon-ecr-login@v2
      - uses: docker/setup-buildx-action@v3
      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/services/NotSoSimpleEcommerce.HealthChecker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.ECR_REGISTRY }}/${{ env.IMAGE_REPO_PREFIX }}/health-checker:${{ needs.detect-changes.outputs.tag }}
          cache-from: type=gha,scope=health-checker
          cache-to: type=gha,scope=health-checker,mode=max

  notificator:
    name: Notificator Worker
    needs: detect-changes
    if: needs.detect-changes.outputs.shared == 'true' || needs.detect-changes.outputs.notificator == 'true'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - uses: aws-actions/configure-aws-credentials@v5.1.0
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_BACKEND_ROLE_TO_ASSUME }}
      - uses: aws-actions/amazon-ecr-login@v2
      - uses: docker/setup-buildx-action@v3
      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/workers/NotSoSimpleEcommerce.Notificator/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.ECR_REGISTRY }}/${{ env.IMAGE_REPO_PREFIX }}/notificator:${{ needs.detect-changes.outputs.tag }}
          cache-from: type=gha,scope=notificator
          cache-to: type=gha,scope=notificator,mode=max

  invoice-generator:
    name: Invoice Generator Worker
    needs: detect-changes
    if: needs.detect-changes.outputs.shared == 'true' || needs.detect-changes.outputs.invoice-generator == 'true'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - uses: aws-actions/configure-aws-credentials@v5.1.0
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_BACKEND_ROLE_TO_ASSUME }}
      - uses: aws-actions/amazon-ecr-login@v2
      - uses: docker/setup-buildx-action@v3
      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/workers/NotSoSimpleEcommerce.InvoiceGenerator/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.ECR_REGISTRY }}/${{ env.IMAGE_REPO_PREFIX }}/invoice-generator:${{ needs.detect-changes.outputs.tag }}
          cache-from: type=gha,scope=invoice-generator
          cache-to: type=gha,scope=invoice-generator,mode=max

  update-gitops:
    name: Update Gitops Kustomization
    needs: [detect-changes, main, order, identity-server, health-checker, notificator, invoice-generator]
    if: |
      always() &&
      needs.detect-changes.result == 'success' &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPO }}
          token: ${{ secrets.GITOPS_PAT }}
          ref: main

      - uses: imranismail/setup-kustomize@v2

      - name: Bump image tags for changed services
        working-directory: ${{ env.GITOPS_KUSTOMIZE_DIR }}
        env:
          TAG: ${{ needs.detect-changes.outputs.tag }}
          SHARED: ${{ needs.detect-changes.outputs.shared }}
          MAIN: ${{ needs.detect-changes.outputs.main }}
          ORDER: ${{ needs.detect-changes.outputs.order }}
          IDENTITY: ${{ needs.detect-changes.outputs.identity-server }}
          HEALTH: ${{ needs.detect-changes.outputs.health-checker }}
          NOTIF: ${{ needs.detect-changes.outputs.notificator }}
          INVOICE: ${{ needs.detect-changes.outputs.invoice-generator }}
        run: |
          bump() {
            kustomize edit set image \
              ${{ env.ECR_REGISTRY }}/${{ env.IMAGE_REPO_PREFIX }}/$1=*:${TAG}
          }

          if [ "$SHARED" = "true" ] || [ "$MAIN" = "true" ];     then bump main; fi
          if [ "$SHARED" = "true" ] || [ "$ORDER" = "true" ];    then bump order; fi
          if [ "$SHARED" = "true" ] || [ "$IDENTITY" = "true" ]; then bump identity-server; fi
          if [ "$SHARED" = "true" ] || [ "$HEALTH" = "true" ];   then bump health-checker; fi
          if [ "$SHARED" = "true" ] || [ "$NOTIF" = "true" ];    then bump notificator; fi
          if [ "$SHARED" = "true" ] || [ "$INVOICE" = "true" ];  then bump invoice-generator; fi

      - name: Commit & push
        env:
          TAG: ${{ needs.detect-changes.outputs.tag }}
        run: |
          git config user.email "ci-bot@nsse.dev"
          git config user.name "ci-bot"
          git add ${{ env.GITOPS_KUSTOMIZE_DIR }}/kustomization.yml
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "ci(cd): bump images to ${TAG}"
            git push
          fi
